services:
  backend:
    build:
      context: ./backend
      target: dev
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      BACKEND_CORS_ORIGINS: http://localhost:3000,http://localhost:5173
      BACKEND_BASIC_AUTH_USERNAME: ${BACKEND_BASIC_AUTH_USERNAME:-}
      BACKEND_BASIC_AUTH_PASSWORD: ${BACKEND_BASIC_AUTH_PASSWORD:-}
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv

  frontend:
    build:
      context: ./frontend
      target: dev
    command: pnpm dev --host 0.0.0.0 --port 80
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  backend_venv:
  frontend_node_modules:
