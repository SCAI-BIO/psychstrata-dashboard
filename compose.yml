name: psychstrata-dashboard

services:
  backend:
    build:
      context: ./backend
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      target: production
      args:
        VITE_API_BASE_URL: ""
        VITE_APP_PASSWORD: ${VITE_APP_PASSWORD:-}
    environment:
      BACKEND_HOST: backend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy