name: Backend Deploy

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

jobs:
  build_docker_image:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Get Version Tag
      id: version
      run: echo "VERSION=${GITHUB_REF/refs\/tags\/v/}" >> "$GITHUB_OUTPUT"

    - name: Docker Login
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build & push backend
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        file: ./backend/Dockerfile
        push: true
        tags: |
          ghcr.io/scai-bio/psychstrata-dashboard/backend:latest
          ghcr.io/scai-bio/psychstrata-dashboard/backend:${{ steps.version.outputs.VERSION }}
